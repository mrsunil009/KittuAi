version: '3.8'
services:
  # The name of your MongoDB service (used as the hostname for your app to connect)
  mongodb:
    image: mongo:latest # Use the official MongoDB image
    container_name: your-mongo-db
    ports:
      # Map container port 27017 to host port 27017
      - "27017:27017" 
    environment:
      # Set up a root user for basic security (recommended)
      MONGO_INITDB_ROOT_USERNAME: your_user
      MONGO_INITDB_ROOT_PASSWORD: your_password
      # Optional: Set the initial database name
      MONGO_INITDB_DATABASE: your_database_name
    volumes:
      # Optional: Persist data across container restarts
      - mongo-data:/data/db

volumes:
  mongo-data:
    driver: local